[pytest]
# 智批云 API 测试套件配置

# 将后端根目录和 tests/ 加入 Python 路径
# - .  → 让 import services / controllers / models 可用
# - tests → 让 import fixtures.test_data 可用
pythonpath = . tests

# 测试目录
testpaths = tests

# Python 文件匹配模式
python_files = test_*.py

# 测试类匹配模式
python_classes = Test*

# 测试函数匹配模式
python_functions = test_*

# 最小 Python 版本
minversion = 8.0

# 输出配置
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    -p no:cacheprovider

# 自定义标记
markers =
    unit: 单元测试（不依赖数据库和外部 API）
    integration: 集成测试（需要数据库连接）
    slow: 耗时较长的测试
    performance: 性能测试
    security: 安全测试
    ocr: OCR 批阅链路测试
    auth: 认证相关测试
    admin: 管理员接口测试

# 覆盖率配置
[coverage:run]
source = .
omit =
    */tests/*
    */.venv/*
    */site-packages/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:

# 超时配置
timeout = 60
timeout_func_only = true
